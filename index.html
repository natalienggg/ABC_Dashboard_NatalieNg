<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Center | ABC Logistics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --logistics-blue: #1e3a5f;
      --logistics-blue-dark: #152a45;
      --logistics-blue-light: #2c5282;
      --logistics-accent: #3182ce;
      --logistics-accent-light: #63b3ed;
      --logistics-bg: #f0f4f8;
      --logistics-card: #ffffff;
      --logistics-text: #2d3748;
      --logistics-text-muted: #718096;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--logistics-bg);
      color: var(--logistics-text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .site-header {
      background: linear-gradient(135deg, var(--logistics-blue) 0%, var(--logistics-blue-light) 100%);
      color: white;
      padding: 1rem 2rem;
      box-shadow: 0 2px 8px rgba(30, 58, 95, 0.2);
    }
    .site-header h1 { font-size: 1.5rem; font-weight: 600; }
    .site-header .tagline { font-size: 0.875rem; opacity: 0.9; margin-top: 0.25rem; }
    nav {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      transition: background 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.15); }
    nav a.active { background: rgba(255,255,255,0.25); }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--logistics-card);
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 2px 10px rgba(30, 58, 95, 0.08);
      border: 1px solid rgba(30, 58, 95, 0.06);
    }
    .card h2 {
      color: var(--logistics-blue);
      font-size: 1.125rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-weight: 500;
      color: var(--logistics-text);
      margin-bottom: 0.35rem;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--logistics-accent);
      box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2);
    }
    button[type="submit"] {
      background: var(--logistics-accent);
      color: white;
      border: none;
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: var(--logistics-blue-light); }
    .actions { margin-top: 1rem; }
    .clear-all-btn {
      background: transparent;
      color: #c53030;
      border: 1px solid #c53030;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .clear-all-btn:hover { background: #c53030; color: white; }
    .item-list {
      list-style: none;
      margin-top: 1rem;
    }
    .item-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.9rem;
    }
    .item-list li:last-child { border-bottom: none; }
    .item-list li.low-stock { color: #c53030; font-weight: 500; }
    .item-list li.low-stock::before { content: '⚠ '; }
    .item-list .remove-btn {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem 0.4rem;
      line-height: 1;
    }
    .item-list .remove-btn:hover { text-decoration: underline; }
    .chart-wrap {
      position: relative;
      height: 320px;
    }
    .empty-state {
      color: var(--logistics-text-muted);
      text-align: center;
      padding: 2rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>Command Center</h1>
    <p class="tagline">ABC Logistics — Inventory overview</p>
    <nav>
      <a href="index.html" class="active">Dashboard</a>
      <a href="about.html">About</a>
    </nav>
  </header>
  <main class="container">
    <div class="dashboard-grid">
      <section class="card">
        <h2>Add item</h2>
        <form id="item-form">
          <div class="form-group">
            <label for="item-name">Item name</label>
            <input type="text" id="item-name" name="itemName" placeholder="e.g. Pallets, Boxes" required />
          </div>
          <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" min="0" step="1" placeholder="0" required inputmode="numeric" />
          </div>
          <button type="submit">Add to inventory</button>
        </form>
        <div class="actions">
          <button type="button" id="clear-all-btn" class="clear-all-btn">Clear All Items</button>
        </div>
        <ul class="item-list" id="item-list" aria-label="Current inventory"></ul>
      </section>
      <section class="card">
        <h2>Inventory overview</h2>
        <div class="chart-wrap">
          <canvas id="inventory-chart" aria-label="Bar chart of inventory items and quantities"></canvas>
        </div>
        <p id="chart-empty" class="empty-state">Add items above to see the chart.</p>
      </section>
    </div>
  </main>
  <script>
    const STORAGE_KEY = 'abc-logistics-command-center';
    const SAMPLE_ITEMS = [
      { name: 'Heavy Pallets', quantity: 25 },
      { name: 'Packing Tape', quantity: 8 },
      { name: 'Small Boxes', quantity: 40 },
      { name: 'Bubble Wrap', quantity: 5 },
      { name: 'Forklift Tires', quantity: 12 }
    ];
    const LOW_STOCK_THRESHOLD = 10;
    let chart = null;

    function getData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function saveData(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function ensureSeedData() {
      const data = getData();
      if (data.length === 0) {
        saveData(SAMPLE_ITEMS.slice());
      }
    }

    function renderList() {
      const items = getData();
      const list = document.getElementById('item-list');
      list.innerHTML = items.length === 0
        ? '<li class="empty-state">No items yet.</li>'
        : items.map((item, i) => {
            const isLow = item.quantity < LOW_STOCK_THRESHOLD;
            return `<li${isLow ? ' class="low-stock"' : ''}>
              <span><strong>${escapeHtml(item.name)}</strong> — ${item.quantity}</span>
              <button type="button" class="remove-btn" data-index="${i}" aria-label="Remove ${escapeHtml(item.name)}">×</button>
            </li>`;
          }).join('');
      list.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.index, 10);
          const data = getData();
          data.splice(idx, 1);
          saveData(data);
          renderList();
          updateChart();
        });
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function toTitleCase(str) {
      return str.trim().split(/\s+/).map(word =>
        word.length === 0 ? '' : word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
      ).join(' ');
    }

    function getWords(str) {
      return str.toLowerCase().split(/\s+/).map(w => w.replace(/[^a-z0-9]/g, '')).filter(Boolean);
    }

    function hasSimilarItem(newName, existingItems) {
      const newWords = new Set(getWords(newName));
      if (newWords.size === 0) return false;
      for (const item of existingItems) {
        const existingWords = getWords(item.name);
        if (existingWords.some(w => newWords.has(w))) return true;
      }
      return false;
    }

    function updateChart() {
      const items = getData();
      const canvas = document.getElementById('inventory-chart');
      const emptyEl = document.getElementById('chart-empty');
      if (items.length === 0) {
        if (chart) {
          chart.destroy();
          chart = null;
        }
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';
      const ctx = canvas.getContext('2d');
      if (chart) chart.destroy();
      const barColors = items.map(i =>
        i.quantity < LOW_STOCK_THRESHOLD ? 'rgba(197, 48, 48, 0.8)' : 'rgba(49, 130, 206, 0.7)'
      );
      const barBorders = items.map(i =>
        i.quantity < LOW_STOCK_THRESHOLD ? '#c53030' : '#3182ce'
      );
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: items.map(i => i.name),
          datasets: [{
            label: 'Quantity',
            data: items.map(i => i.quantity),
            backgroundColor: barColors,
            borderColor: barBorders,
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1 },
              grid: { color: 'rgba(30, 58, 95, 0.06)' }
            },
            x: {
              grid: { display: false }
            }
          }
        }
      });
    }

    document.getElementById('item-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const nameInput = document.getElementById('item-name');
      const qtyInput = document.getElementById('quantity');
      const name = toTitleCase(nameInput.value.trim());
      const qtyRaw = qtyInput.value;
      const quantity = parseInt(qtyRaw, 10);

      if (name === '' || name === null) return;

      if (qtyRaw === '' || qtyRaw === null || isNaN(quantity)) {
        alert('Quantity must be a number.');
        qtyInput.focus();
        return;
      }
      if (quantity < 0) {
        alert('Quantities cannot be negative numbers.');
        qtyInput.focus();
        return;
      }

      const data = getData();
      const isDuplicate = data.some(i => i.name.toLowerCase() === name.toLowerCase());
      if (isDuplicate) {
        alert('Item names cannot be duplicates. This item already exists in the list.');
        nameInput.focus();
        return;
      }

      if (hasSimilarItem(name, data)) {
        if (!confirm('A similar item already exists. Are you sure you want to create a new category?')) {
          nameInput.focus();
          return;
        }
      }

      data.push({ name, quantity });
      saveData(data);
      nameInput.value = '';
      qtyInput.value = '';
      nameInput.focus();
      renderList();
      updateChart();
    });

    document.getElementById('clear-all-btn').addEventListener('click', () => {
      saveData([]);
      renderList();
      updateChart();
    });

    ensureSeedData();
    renderList();
    updateChart();
  </script>
</body>
</html>
